<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Cursor Effect Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>
  
  <button id="menu-toggle" class="floating-btn" title="Open Settings">⚙️</button>

  <div id="settings-panel" class="glass-panel">
    <div class="panel-header">
      <h3>✨ Neon Controls Pro</h3>
      <button id="menu-close" class="close-btn" title="Close Settings">&times;</button>
    </div>
    
    <div class="panel-content">
      <div class="section-title">Visuals</div>
      <div class="control-grid">
        <div class="slider-group full-width">
          <label for="color-theme">Color Theme</label>
          <select id="color-theme">
            <option value="velocity">🌌 Velocity (Cyan to Pink)</option>
            <option value="rainbow">🌈 Rainbow (Time Based)</option>
            <option value="fire">🔥 Fire (Red to Yellow)</option>
            <option value="sunset">🌇 Sunset (Orange to Purple)</option>
            <option value="ocean">🌊 Ocean (Blue to Aqua)</option>
          </select>
        </div>

        <div class="toggle-group">
          <label>Magic Sparkles ✨</label>
          <button id="btn-sparkles" class="active">ON</button>
        </div>
        <div class="toggle-group">
          <label>Blend Mode 🪄</label>
          <button id="btn-blend" class="active">Lighter</button>
        </div>
      </div>

      <div class="section-title">Physics & Size</div>
      <div class="control-grid">
        <div class="slider-group full-width">
          <label for="trail-length">Trail Length (Particles)</label>
          <input type="range" id="trail-length" min="10" max="100" step="5" value="40">
        </div>
        <div class="slider-group">
          <label for="lerp1">Lerp 1 (Tracking)</label>
          <input type="range" id="lerp1" min="0.05" max="0.5" step="0.01" value="0.15">
        </div>
        <div class="slider-group">
          <label for="lerp2">Lerp 2 (Smoothness)</label>
          <input type="range" id="lerp2" min="0.1" max="0.9" step="0.05" value="0.5">
        </div>
        <div class="slider-group">
          <label for="line-radius">Line Thickness</label>
          <input type="range" id="line-radius" min="1" max="10" step="1" value="3">
        </div>
        <div class="slider-group">
          <label for="glow-radius">Glow Intensity</label>
          <input type="range" id="glow-radius" min="5" max="50" step="1" value="20">
        </div>
      </div>

      <div class="section-title">Idle Mode</div>
      <div class="button-group">
        <button id="btn-circle">⭕ Circle</button>
        <button id="btn-infinity" class="active">♾️ Infinity</button>
      </div>
    </div>
    
    <div class="footer">
      Built by <a href="https://github.com/pankajtiwari-art" target="_blank">Pankaj Tiwari</a> | Developer
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
